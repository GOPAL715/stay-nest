spring:
  application:
    name: staynest-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: vgudipat@gitam.in
    password: ttmo iaoo aoda pyyo
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 2

server:
  port: 8081
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    try-it-out-enabled: true
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

app:
  frontend:
    customer-url: ${FRONTEND_CUSTOMER_URL:http://localhost:5173}
    admin-url: ${FRONTEND_ADMIN_URL:http://localhost:5174}
  email:
    from: ${EMAIL_FROM:vgudipat@gitam.in}
    base-url: ${APP_BASE_URL:http://localhost:8080}
  auth:
    email-verification-required: true
  geocoding:
    enabled: true
    nominatim:
      base-url: https://nominatim.openstreetmap.org
      user-agent: StayNest/1.0
      email: ${GEOCODING_CONTACT_EMAIL:dev@staynest.local}
  login:
    max-attempts: 5
    lockout-duration-minutes: 15
  payments:
    # Demo mode simulates Razorpay locally — no external API keys required.
    demo-mode: ${PAYMENTS_DEMO_MODE:true}

management:
  health:
    mail:
      enabled: false

logging:
  level:
    com.staynest: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: DEBUG

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:}
    secret: ${RAZORPAY_KEY_SECRET:}
